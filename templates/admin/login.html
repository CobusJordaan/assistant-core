<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI PC Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/admin/admin.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <h1>AI PC Admin</h1>
        <h2>Sign in to manage assistant-core</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if lockout_remaining %}
        <div class="alert alert-error">Too many failed attempts. Try again in {{ lockout_remaining // 60 }}m {{ lockout_remaining % 60 }}s.</div>
        {% endif %}

        {% if info %}
        <div class="alert alert-info">{{ info }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="input-group">
                <label class="input-label" for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" {% if lockout_remaining %}disabled{% endif %}>Sign In</button>
        </form>
    </div>
</body>
</html>
