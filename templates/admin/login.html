<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — assistant-core admin</title>
    <link rel="stylesheet" href="/static/admin/admin.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>assistant-core</h1>
        <h2>Admin Dashboard</h2>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% if lockout_remaining %}
        <div class="alert alert-error">Too many failed attempts. Try again in {{ lockout_remaining // 60 }}m {{ lockout_remaining % 60 }}s.</div>
        {% endif %}

        {% if info %}
        <div class="alert alert-info">{{ info }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="input-group">
                <label class="input-label" for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" {% if lockout_remaining %}disabled{% endif %}>Sign In</button>
        </form>
    </div>
</body>
</html>
